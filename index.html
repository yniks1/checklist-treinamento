<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checklist de Treinamento - Assistência 24h</title>
    <style>
        :root {
            --verde-escuro: #032e30;
            --verde-claro: #abbebe;
            --branco: #ffffff;
            --cinza-texto: #000000;
            --cinza-borda: #dddddd;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #7dceee;
            color: var(--cinza-texto);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--branco);
            width: 100%;
            max-width: 800px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            overflow: hidden;
            border-top: 10px solid var(--verde-escuro);
        }

        header {
            background-color: var(--branco);
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid var(--cinza-borda);
        }

        h1 {
            color: var(--verde-escuro);
            margin: 0;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .content {
            padding: 20px;
        }

        .categoria {
            margin-bottom: 25px;
        }

        .categoria-titulo {
            background-color: var(--verde-escuro);
            color: var(--branco);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .item-lista {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #f0f0f0;
            transition: all 0.2s;
        }

        .item-lista:hover {
            background-color: var(--verde-claro);
        }

        .item-lista:last-child {
            border-bottom: none;
        }

        /* Estilização do Checkbox */
        input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            height: 22px;
            width: 22px;
            border: 2px solid var(--verde-escuro);
            border-radius: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            flex-shrink: 0;
            transition: 0.2s;
        }

        input[type="checkbox"]:checked {
            background-color: var(--verde-escuro);
        }

        input[type="checkbox"]:checked::after {
            content: "✔";
            color: white;
            font-size: 14px;
        }

        label {
            cursor: pointer;
            font-size: 1rem;
            width: 100%;
            transition: 0.2s;
        }

        input[type="checkbox"]:checked + label {
            color: #888;
            text-decoration: line-through;
        }

        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.85rem;
            color: #777;
            background-color: #fafafa;
            border-top: 1px solid var(--cinza-borda);
        }

        /* Barra de Progresso Fixa */
        .progress-container {
            position: sticky;
            top: 0;
            background: white;
            padding: 10px 20px;
            border-bottom: 1px solid var(--cinza-borda);
            z-index: 100;
        }

        .progress-bar {
            height: 8px;
            background-color: #eee;
            border-radius: 4px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background-color: var(--verde-escuro);
            width: 0%;
            transition: width 0.4s ease;
        }

        .progress-text {
            font-size: 0.8rem;
            margin-bottom: 5px;
            color: var(--verde-escuro);
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Treinamento Operacional</h1>
        <p>Assistência 24h Veicular</p>
    </header>

    <div class="progress-container">
        <div class="progress-text">Progresso do Treinamento: <span id="percent">0%</span></div>
        <div class="progress-bar">
            <div id="progress-fill"></div>
        </div>
    </div>

    <div class="content">
        <div class="categoria">
            <div class="categoria-titulo">Conceitos Iniciais</div>
            <div class="item-lista"><input type="checkbox" id="item1"><label for="item1">O que é uma assistência 24 horas?</label></div>
            <div class="item-lista"><input type="checkbox" id="item2"><label for="item2">O que são associações?</label></div>
            <div class="item-lista"><input type="checkbox" id="item3"><label for="item3">O que são prestadores de serviços?</label></div>
        </div>

        <div class="categoria">
            <div class="categoria-titulo">Motivos e Fatores Geradores</div>
            <div class="item-lista"><input type="checkbox" id="item4"><label for="item4">Motivos para contatar a assistência 24 horas</label></div>
            <div class="item-lista"><input type="checkbox" id="item5"><label for="item5">O que é o Fator Gerador x Evento</label></div>
            <div class="item-lista"><input type="checkbox" id="item6"><label for="item6">Acidente</label></div>
            <div class="item-lista"><input type="checkbox" id="item7"><label for="item7">Colisão</label></div>
            <div class="item-lista"><input type="checkbox" id="item8"><label for="item8">Pane elétrica ou mecânica</label></div>
            <div class="item-lista"><input type="checkbox" id="item9"><label for="item9">Falta de combustível</label></div>
            <div class="item-lista"><input type="checkbox" id="item10"><label for="item10">Pneus avariados</label></div>
            <div class="item-lista"><input type="checkbox" id="item11"><label for="item11">Incidentes com chaves</label></div>
            <div class="item-lista"><input type="checkbox" id="item12"><label for="item12">Furto e roubo / Recuperados</label></div>
            <div class="item-lista"><input type="checkbox" id="item13"><label for="item13">Incêndio</label></div>
            <div class="item-lista"><input type="checkbox" id="item14"><label for="item14">Dúvidas e informações</label></div>
        </div>

        <div class="categoria">
            <div class="categoria-titulo">Serviços</div>
            <div class="item-lista"><input type="checkbox" id="item15"><label for="item15">Assistência pneumática</label></div>
            <div class="item-lista"><input type="checkbox" id="item16"><label for="item16">Chaveiro</label></div>
            <div class="item-lista"><input type="checkbox" id="item17"><label for="item17">Comunicação de furto ou roubo</label></div>
            <div class="item-lista"><input type="checkbox" id="item18"><label for="item18">Destombamento / Resgate</label></div>
            <div class="item-lista"><input type="checkbox" id="item19"><label for="item19">Hospedagem</label></div>
            <div class="item-lista"><input type="checkbox" id="item20"><label for="item20">MTA – Meio de Transporte Alternativo</label></div>
            <div class="item-lista"><input type="checkbox" id="item21"><label for="item21">Carga de bateria</label></div>
            <div class="item-lista"><input type="checkbox" id="item22"><label for="item22">Táxi urbano / Passagem rodoviária</label></div>
            <div class="item-lista"><input type="checkbox" id="item23"><label for="item23">Serviços residenciais</label></div>
        </div>

        <div class="categoria">
            <div class="categoria-titulo">Planos e Atendimento</div>
            <div class="item-lista"><input type="checkbox" id="item24"><label for="item24">Planos da proteção veicular e Tabela de valores</label></div>
            <div class="item-lista"><input type="checkbox" id="item25"><label for="item25">Atendimento cordial e Validações</label></div>
            <div class="item-lista"><input type="checkbox" id="item26"><label for="item26">Verificação de vigência/status e Inativos</label></div>
            <div class="item-lista"><input type="checkbox" id="item27"><label for="item27">Confirmação de dados cadastrais</label></div>
            <div class="item-lista"><input type="checkbox" id="item28"><label for="item28">Local de origem x Endereço de residência</label></div>
            <div class="item-lista"><input type="checkbox" id="item29"><label for="item29">Importância do histórico do atendimento</label></div>
            <div class="item-lista"><input type="checkbox" id="item30"><label for="item30">Serviço de continuidade</label></div>
            <div class="item-lista"><input type="checkbox" id="item31"><label for="item31">Veículos enviados para base do prestador</label></div>
        </div>

        <div class="categoria">
            <div class="categoria-titulo">Sistemas e Ferramentas</div>
            <div class="item-lista"><input type="checkbox" id="item32"><label for="item32">Como utilizar o EzChat</label></div>
            <div class="item-lista"><input type="checkbox" id="item33"><label for="item33">Promessa é dívida</label></div>
            <div class="item-lista"><input type="checkbox" id="item34"><label for="item34">Tela de Monitoramento SAME/MCK</label></div>
        </div>

        <div class="categoria">
            <div class="categoria-titulo">Atendimentos sem Cobertura</div>
            <div class="item-lista"><input type="checkbox" id="item35"><label for="item35">Resgate/destombamento (Regras específicas)</label></div>
            <div class="item-lista"><input type="checkbox" id="item36"><label for="item36">Veículos carregados</label></div>
            <div class="item-lista"><input type="checkbox" id="item37"><label for="item37">Vias não cadastradas / Vias de terra</label></div>
            <div class="item-lista"><input type="checkbox" id="item38"><label for="item38">Veículos em oficina / Atolamento</label></div>
            <div class="item-lista"><input type="checkbox" id="item39"><label for="item39">Remoção de veículos de terceiros</label></div>
        </div>

        <div class="categoria">
            <div class="categoria-titulo">Operação, Logística e Reboque</div>
            <div class="item-lista"><input type="checkbox" id="item40"><label for="item40">Rodovias privatizadas e Prazos</label></div>
            <div class="item-lista"><input type="checkbox" id="item41"><label for="item41">Cancelamento de serviços</label></div>
            <div class="item-lista"><input type="checkbox" id="item42"><label for="item42">Equipamento: Patins e Carro de apoio</label></div>
            <div class="item-lista"><input type="checkbox" id="item43"><label for="item43">Tipos: Asa Delta, Plataforma, Lança e Munck</label></div>
        </div>
    </div>

    <footer>
        Criado por Yago Willian | Setor de Qualidade
    </footer>
</div>

<script>
    const checkboxes = document.querySelectorAll('input[type="checkbox"]');
    const progressFill = document.getElementById('progress-fill');
    const percentText = document.getElementById('percent');

    function updateProgress() {
        const total = checkboxes.length;
        const checked = document.querySelectorAll('input[type="checkbox"]:checked').length;
        const percentage = Math.round((checked / total) * 100);
        
        progressFill.style.width = percentage + "%";
        percentText.innerText = percentage + "%";
    }

    // Carregar dados salvos e aplicar eventos
    checkboxes.forEach((checkbox, index) => {
        const saved = localStorage.getItem('assistencia-item-' + index);
        if (saved === 'true') {
            checkbox.checked = true;
        }

        checkbox.addEventListener('change', () => {
            localStorage.setItem('assistencia-item-' + index, checkbox.checked);
            updateProgress();
        });
    });

    // Inicializar progresso na carga da página
    updateProgress();
</script>

</body>
</html>
